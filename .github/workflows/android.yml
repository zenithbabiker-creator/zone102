name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    # إعداد الـ Java وإجبار النظام على اعتماد إعدادات التوافق
    - name: Set up JDK 22
      uses: actions/setup-java@v4
      with:
        distribution: 'oracle'
        java-version: '22'
        cache: 'gradle' # لتسريع البناء وتجنب تعارض الملفات المؤقتة

    # توليد ملف الـ Wrapper الناقص
    - name: Generate Missing Gradle Wrapper
      run: |
        SETTINGS_PATH=$(find . -name "settings.gradle*" -print -quit)
        if [ -z "$SETTINGS_PATH" ]; then
          APP_PATH=$(find . -name "app" -type d -print -quit)
          if [ -z "$APP_PATH" ]; then
            TARGET_DIR="."
          else
            TARGET_DIR=$(dirname "$APP_PATH")
          fi
        else
          TARGET_DIR=$(dirname "$SETTINGS_PATH")
        fi
        
        cd "$TARGET_DIR"
        gradle wrapper --gradle-version 8.7
        chmod +x gradlew

    # بناء التطبيق مع إضافة أوامر التخطي (Options) لضمان عدم توقف البناء بسبب التحذيرات
    - name: Build Debug APK
      run: |
        GRADLEW_PATH=$(find . -name gradlew -print -quit)
        GRADLE_DIR=$(dirname "$GRADLEW_PATH")
        cd "$GRADLE_DIR"
        # خيارات إضافية لتخطي مشاكل الذاكرة والتعارضات الناتجة عن اختلاف الإصدارات
        ./gradlew assembleDebug -Dorg.gradle.jvmargs="-Xmx2048m -Dfile.encoding=UTF-8" --no-daemon

    # رفع ملف الـ APK النهائي
    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: my-android-app-apk
        path: "**/build/outputs/apk/debug/app-debug.apk"
