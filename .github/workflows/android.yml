name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    # إعداد الـ Java 17 المتوافق مع Gradle 8.7
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
        cache: 'gradle'

    # توليد ملف الـ Wrapper مع رفع النسخة إلى 8.7 إجبارياً كما طلب الخطأ
    - name: Generate and Update Gradle Wrapper
      run: |
        SETTINGS_PATH=$(find . -name "settings.gradle*" -print -quit)
        if [ -z "$SETTINGS_PATH" ]; then
          APP_PATH=$(find . -name "app" -type d -print -quit)
          if [ -z "$APP_PATH" ]; then
            TARGET_DIR="."
          else
            TARGET_DIR=$(dirname "$APP_PATH")
          fi
        else
          TARGET_DIR=$(dirname "$SETTINGS_PATH")
        fi
        
        cd "$TARGET_DIR"
        # تم التعديل هنا إلى النسخة المطلوبة 8.7
        gradle wrapper --gradle-version 8.7 --distribution-type all
        chmod +x gradlew

    # إعداد ملف الخصائص لتفادي أي تعارض في الذاكرة
    - name: Patch Gradle Properties
      run: |
        GRADLEW_PATH=$(find . -name gradlew -print -quit)
        PROJECT_ROOT=$(dirname "$GRADLEW_PATH")
        cd "$PROJECT_ROOT"
        if [ -f "gradle.properties" ]; then
          echo "org.gradle.jvmargs=-Xmx2048m -XX:MaxMetaspaceSize=512m" >> gradle.properties
        else
          echo "org.gradle.jvmargs=-Xmx2048m -XX:MaxMetaspaceSize=512m" > gradle.properties
        fi

    # بدء بناء التطبيق
    - name: Build Debug APK
      run: |
        GRADLEW_PATH=$(find . -name gradlew -print -quit)
        GRADLE_DIR=$(dirname "$GRADLEW_PATH")
        cd "$GRADLE_DIR"
        ./gradlew assembleDebug --no-daemon

    # رفع ملف الـ APK المستخرج
    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: my-android-app-apk
        path: "**/build/outputs/apk/debug/app-debug.apk"
