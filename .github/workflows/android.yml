name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    # استخدام إصدار JDK 17 كخيار برميجي مستقر جداً مع مكتبات 2024
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
        cache: 'gradle'

    # توليد ملفات البيئة الناقصة
    - name: Generate Missing Gradle Wrapper
      run: |
        SETTINGS_PATH=$(find . -name "settings.gradle*" -print -quit)
        if [ -z "$SETTINGS_PATH" ]; then
          APP_PATH=$(find . -name "app" -type d -print -quit)
          if [ -z "$APP_PATH" ]; then
            TARGET_DIR="."
          else
            TARGET_DIR=$(dirname "$APP_PATH")
          fi
        else
          TARGET_DIR=$(dirname "$SETTINGS_PATH")
        fi
        
        cd "$TARGET_DIR"
        gradle wrapper --gradle-version 8.7
        chmod +x gradlew

    # تشغيل البناء مع إظهار تفاصيل الخطأ كاملة (stacktrace) لمعرفة المسبب فوراً
    - name: Build Debug APK with Stacktrace
      run: |
        GRADLEW_PATH=$(find . -name gradlew -print -quit)
        GRADLE_DIR=$(dirname "$GRADLEW_PATH")
        cd "$GRADLE_DIR"
        ./gradlew assembleDebug --stacktrace -Dorg.gradle.jvmargs="-Xmx2048m -Dfile.encoding=UTF-8"

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: my-android-app-apk
        path: "**/build/outputs/apk/debug/app-debug.apk"
