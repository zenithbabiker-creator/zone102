name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    # إعداد الـ Java
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
        cache: 'gradle'

    # توليد ملف الـ Wrapper بالنسخة المتوافقة 8.7
    - name: Generate and Update Gradle Wrapper
      run: |
        SETTINGS_PATH=$(find . -name "settings.gradle*" -print -quit)
        if [ -z "$SETTINGS_PATH" ]; then
          APP_PATH=$(find . -name "app" -type d -print -quit)
          if [ -z "$APP_PATH" ]; then
            TARGET_DIR="."
          else
            TARGET_DIR=$(dirname "$APP_PATH")
          fi
        else
          TARGET_DIR=$(dirname "$SETTINGS_PATH")
        fi
        
        cd "$TARGET_DIR"
        gradle wrapper --gradle-version 8.7 --distribution-type all
        chmod +x gradlew

    # تعديل ملفات الخصائص وحقن المانيفست بالبايثون لحل التعارض نهائياً
    - name: Patch Manifest via Python and Gradle Properties
      run: |
        GRADLEW_PATH=$(find . -name gradlew -print -quit)
        PROJECT_ROOT=$(dirname "$GRADLEW_PATH")
        cd "$PROJECT_ROOT"
        
        # تفعيل خصائص أندرويد إكس والذاكرة
        echo "android.useAndroidX=true" >> gradle.properties
        echo "android.enableJetifier=true" >> gradle.properties
        echo "org.gradle.jvmargs=-Xmx2048m -XX:MaxMetaspaceSize=512m" >> gradle.properties

        # البحث عن ملف المانيفست وتعديله برمجياً بالبايثون لضمان الدقة
        MANIFEST_PATH=$(find . -name "AndroidManifest.xml" -print -quit)
        if [ -f "$MANIFEST_PATH" ]; then
          echo "Patching AndroidManifest.xml at: $MANIFEST_PATH"
          python3 -c "
import xml.etree.ElementTree as ET

# تسجيل فضاءات الأسماء لتجنب تلف الملف
ET.register_namespace('android', 'http://schemas.android.com/apk/res/android')
ET.register_namespace('tools', 'http://schemas.android.com/tools')

tree = ET.parse('$MANIFEST_PATH')
root = tree.getroot()

# إضافة فضاء أسماء tools إلى الجذر
root.set('xmlns:tools', 'http://schemas.android.com/tools')

# البحث عن عنصر com.google.ar.core واستهدافه مباشرة
patched = False
for meta in root.findall('.//meta-data'):
    name = meta.get('{http://schemas.android.com/apk/res/android}name')
    if name == 'com.google.ar.core':
        meta.set('{http://schemas.android.com/tools}replace', 'android:value')
        patched = True
        print('Successfully added tools:replace to com.google.ar.core')

if patched:
    tree.write('$MANIFEST_PATH', encoding='utf-8', xml_declaration=True)
else:
    print('Warning: com.google.ar.core meta-data tag not found via parser!')
"
        fi

    # بدء بناء التطبيق
    - name: Build Debug APK
      run: |
        GRADLEW_PATH=$(find . -name gradlew -print -quit)
        GRADLE_DIR=$(dirname "$GRADLEW_PATH")
        cd "$GRADLE_DIR"
        ./gradlew assembleDebug --no-daemon

    # رفع ملف الـ APK المستخرج
    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: my-android-app-apk
        path: "**/build/outputs/apk/debug/app-debug.apk"
