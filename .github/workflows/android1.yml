name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    # إعداد الـ Java
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
        cache: 'gradle'

    # توليد ملف الـ Wrapper بالنسخة المتوافقة 8.7
    - name: Generate and Update Gradle Wrapper
      run: |
        SETTINGS_PATH=$(find . -name "settings.gradle*" -print -quit)
        if [ -z "$SETTINGS_PATH" ]; then
          APP_PATH=$(find . -name "app" -type d -print -quit)
          if [ -z "$APP_PATH" ]; then
            TARGET_DIR="."
          else
            TARGET_DIR=$(dirname "$APP_PATH")
          fi
        else
          TARGET_DIR=$(dirname "$SETTINGS_PATH")
        fi
        
        cd "$TARGET_DIR"
        gradle wrapper --gradle-version 8.7 --distribution-type all
        chmod +x gradlew

    # تعديل الخصائص وحقن المانيفست وتوليد الأيقونة بأمان
    - name: Patch Manifest, Resources and Gradle Properties
      run: |
        GRADLEW_PATH=$(find . -name gradlew -print -quit)
        PROJECT_ROOT=$(dirname "$GRADLEW_PATH")
        cd "$PROJECT_ROOT"
        
        # 1. تفعيل خصائص أندرويد إكس وإعدادات الذاكرة
        echo "android.useAndroidX=true" >> gradle.properties
        echo "android.enableJetifier=true" >> gradle.properties
        echo "org.gradle.jvmargs=-Xmx2048m -XX:MaxMetaspaceSize=512m" >> gradle.properties

        # 2. تعديل ملف المانيفست لحل مشكلة تعارض ARCore
        MANIFEST_PATH=$(find . -name "AndroidManifest.xml" -print -quit)
        if [ -f "$MANIFEST_PATH" ]; then
          echo "Patching AndroidManifest.xml"
          sed -i 's|<manifest|<manifest xmlns:tools="http://schemas.android.com/tools"|g' "$MANIFEST_PATH"
          sed -i 's|xmlns:tools="http://schemas.android.com/tools" xmlns:tools="http://schemas.android.com/tools"|xmlns:tools="http://schemas.android.com/tools"|g' "$MANIFEST_PATH"
          sed -i 's|android:name="com.google.ar.core"|android:name="com.google.ar.core" tools:replace="android:value"|g' "$MANIFEST_PATH"
        fi

        # 3. توليد الأيقونة المخصصة (ZONE + الوردة) مشفرة لحل أخطاء الـ XML في جيتهاب
        RES_DIR=$(find . -type d -name "res" | grep "src/main/res" -m 1)
        if [ -d "$RES_DIR" ]; then
          echo "Found res directory at: $RES_DIR"
          mkdir -p "$RES_DIR/mipmap-hdpi"
          
          # فك تشفير النص وتوليد ملف ic_launcher.xml بشكل آمن 100% بدون اعتراض من جيتهاب
          echo "" | base64 -d > "$RES_DIR/mipmap-hdpi/ic_launcher.xml"
          
          echo "Custom Base64 ZONE + Flower icon generated successfully."
        else
          echo "Warning: res directory not found!"
        fi

    # بدء بناء التطبيق
    - name: Build Debug APK
      run: |
        GRADLEW_PATH=$(find . -name gradlew -print -quit)
        GRADLE_DIR=$(dirname "$GRADLEW_PATH")
        cd "$GRADLE_DIR"
        ./gradlew assembleDebug --no-daemon

    # رفع ملف الـ APK المستخرج جاهزاً للتحميل
    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: my-android-app-apk
        path: "**/build/outputs/apk/debug/app-debug.apk"
