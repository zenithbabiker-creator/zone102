name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    # إعداد الـ Java
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
        cache: 'gradle'

    # توليد ملف الـ Wrapper بالنسخة المتوافقة 8.7
    - name: Generate and Update Gradle Wrapper
      run: |
        SETTINGS_PATH=$(find . -name "settings.gradle*" -print -quit)
        if [ -z "$SETTINGS_PATH" ]; then
          APP_PATH=$(find . -name "app" -type d -print -quit)
          if [ -z "$APP_PATH" ]; then
            TARGET_DIR="."
          else
            TARGET_DIR=$(dirname "$APP_PATH")
          fi
        else
          TARGET_DIR=$(dirname "$SETTINGS_PATH")
        fi
        
        cd "$TARGET_DIR"
        gradle wrapper --gradle-version 8.7 --distribution-type all
        chmod +x gradlew

    # تعديل الخصائص، المانيفست، وبناء الأيقونة، وحقن الاعتماديات متوافقة مع Kotlin DSL
    - name: Patch Manifest, Resources, Dependencies and Gradle Properties
      run: |
        GRADLEW_PATH=$(find . -name gradlew -print -quit)
        PROJECT_ROOT=$(dirname "$GRADLEW_PATH")
        cd "$PROJECT_ROOT"
        
        # 1. تفعيل خصائص أندرويد إكس والـ Jetifier وإعدادات الذاكرة
        echo "android.useAndroidX=true" > gradle.properties
        echo "android.enableJetifier=true" >> gradle.properties
        echo "org.gradle.jvmargs=-Xmx3072m -XX:MaxMetaspaceSize=768m" >> gradle.properties

        # 2. تعديل ملف المانيفست لحل مشكلة تعارض ARCore
        MANIFEST_PATH=$(find . -name "AndroidManifest.xml" -print -quit)
        if [ -f "$MANIFEST_PATH" ]; then
          echo "Patching AndroidManifest.xml"
          sed -i 's|<manifest|<manifest xmlns:tools="http://schemas.android.com/tools"|g' "$MANIFEST_PATH"
          sed -i 's|xmlns:tools="http://schemas.android.com/tools" xmlns:tools="http://schemas.android.com/tools"|xmlns:tools="http://schemas.android.com/tools"|g' "$MANIFEST_PATH"
          sed -i 's|android:name="com.google.ar.core"|android:name="com.google.ar.core" tools:replace="android:value"|g' "$MANIFEST_PATH"
        fi

        # 3. توليد الأيقونة المخصصة (ZONE + الوردة)
        RES_DIR=$(find . -type d -name "res" | grep "src/main/res" -m 1)
        if [ -d "$RES_DIR" ]; then
          echo "Found res directory at: $RES_DIR"
          mkdir -p "$RES_DIR/mipmap-hdpi"
          ICON_FILE="$RES_DIR/mipmap-hdpi/ic_launcher.xml"
          
          echo '<?xml version="1.0" encoding="utf-8"?>' > "$ICON_FILE"
          echo '<vector xmlns:android="http://schemas.android.com/apk/res/android" android:width="108dp" android:height="108dp" android:viewportWidth="108" android:viewportHeight="108">' >> "$ICON_FILE"
          echo '  <path android:fillColor="#00695C" android:pathData="M0,0h108v108h-108z"/>' >> "$ICON_FILE"
          echo '  <path android:fillColor="#FF2A6D" android:pathData="M54,22 C48,22 46,28 54,34 C62,28 60,22 54,22 Z M54,34 C48,34 42,38 48,44 C54,50 60,44 54,34 Z M54,34 C60,34 66,38 60,44 C54,50 48,44 54,34 Z M54,22 C60,22 66,26 60,32 C54,38 48,32 54,22 Z"/>' >> "$ICON_FILE"
          echo '  <path android:fillColor="#FFD600" android:pathData="M54,34m-3,0a3,3 0,1 1,6 0a3,3 0,1 1,-6 0"/>' >> "$ICON_FILE"
          echo '  <path android:fillColor="#00E676" android:pathData="M53,37h2v10h-2z"/>' >> "$ICON_FILE"
          echo '  <group android:translateX="24" android:translateY="56">' >> "$ICON_FILE"
          echo '    <path android:fillColor="#FFFFFF" android:pathData="M0,0 h12 v2 l-10,10 h10 v2 h-12 v-2 l10,-10 h-10 z"/>' >> "$ICON_FILE"
          echo '    <path android:fillColor="#FFFFFF" android:pathData="M16,0 h10 v14 h-10 z M18,2 h6 v10 h-6 z"/>' >> "$ICON_FILE"
          echo '    <path android:fillColor="#FFFFFF" android:pathData="M30,0 h2 l8,11 v-11 h2 v14 h-2 l-8,-11 v-11 v11 h-2 z"/>' >> "$ICON_FILE"
          echo '    <path android:fillColor="#FFFFFF" android:pathData="M46,0 h12 v2 h-10 v4 h8 v2 h-8 v4 h10 v2 h-12 z"/>' >> "$ICON_FILE"
          echo '  </group>' >> "$ICON_FILE"
          echo '</vector>' >> "$ICON_FILE"
          echo "Custom ZONE Icon patched successfully."
        fi

        # 4. حقن الاعتماديات بالصيغة المتوافقة تماماً مع Kotlin DSL (استخدام الأقواس)
        APP_GRADLE=$(find . -name "build.gradle.kts" | grep "app/build.gradle.kts" -m 1)
        if [ -f "$APP_GRADLE" ]; then
          echo "Injecting missing libraries inside Kotlin DSL build file: $APP_GRADLE"
          sed -i '/dependencies {/a \    implementation("io.github.sceneview:arsceneview:2.2.1")' "$APP_GRADLE"
          sed -i '/dependencies {/a \    implementation("androidx.compose.material3:material3:1.2.1")' "$APP_GRADLE"
          sed -i '/dependencies {/a \    implementation("androidx.compose.material:material:1.6.8")' "$APP_GRADLE"
        fi

    # بدء بناء التطبيق
    - name: Build Debug APK
      run: |
        GRADLEW_PATH=$(find . -name gradlew -print -quit)
        GRADLE_DIR=$(dirname "$GRADLEW_PATH")
        cd "$GRADLE_DIR"
        ./gradlew assembleDebug --no-daemon

    # رفع ملف الـ APK المستخرج جاهزاً للتحميل مباشرة
    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: my-android-app-apk
        path: "**/build/outputs/apk/debug/app-debug.apk"
